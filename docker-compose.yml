x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  # Option A: mount your local config directory (for local Docker setups)
  # volumes:
  #   - ~/.nanobot:/root/.nanobot
  #
  # Option B: configure via environment variables (recommended for cloud deployments)
  # Set your provider API key directly — any standard provider key is supported:
  #   ANTHROPIC_API_KEY, OPENAI_API_KEY, OPENROUTER_API_KEY, DEEPSEEK_API_KEY, etc.
  # Uncomment and set the key for the provider you use, e.g.:
  # environment:
  #   - ANTHROPIC_API_KEY=sk-ant-...
  #   - OPENROUTER_API_KEY=sk-or-...

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
